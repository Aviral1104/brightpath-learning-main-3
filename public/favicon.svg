  <line x1="28" y1="13" x2="28" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="28" cy="21" r="1.5" fill="hsl(30, 85%, 58%)"/>
